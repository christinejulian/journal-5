<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Cloud Feudal Map</title>

<style>
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 50px;
    color: #333;
  }

  h1 {
    text-align: center;
    font-size: 34px;
    margin-bottom: 40px;
    font-weight: 600;
  }

  .map {
    max-width: 1400px;
    margin: 0 auto;
    padding-top: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: auto auto auto auto;
    gap: 35px;
    position: relative;
  }

  .lord {
    background: #ffffff;
    border-radius: 14px;
    padding: 22px 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    font-size: 15px;
    line-height: 1.55;
    transition: transform 0.2s ease;
  }

  .lord:hover {
    transform: translateY(-3px);
  }

  .lord h2 {
    margin: 0 0 12px 0;
    font-size: 20px;
    font-weight: 600;
    color: #222;
  }

  .label {
    font-weight: 600;
    color: #444;
  }

  /* Consumer node */
  .consumer {
    grid-column: 2 / 4;
    grid-row: 2 / 4;
    background: linear-gradient(135deg, #222, #444);
    color: #fff;
    border-radius: 20px;
    width: 260px;
    height: 260px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    text-align: center;
    padding: 20px;
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: transform 0.2s ease;
  }

  .consumer:hover {
    transform: scale(1.03);
  }

  .consumer span {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.6px;
  }

  .consumer small {
    margin-top: 6px;
    font-size: 13px;
    opacity: 0.85;
  }

  /* Expandable info box */
  .more-info {
    margin-top: 12px;
    background: #f9f9f9;
    border-radius: 10px;
    padding: 12px;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .info-btn {
    margin-top: 10px;
    padding: 8px 14px;
    background: #2980b9;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s ease;
  }

  .info-btn:hover {
    background: #1f6a96;
  }

  /* Spider web lines */
  .line {
    position: absolute;
    background: #999;
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 1;
  }

  .line.show {
    opacity: 1;
  }

  /* Vertical lines */
  .line-top { width: 2px; height: 200px; left: 50%; top: 120px; }
  .line-bottom { width: 2px; height: 200px; left: 50%; top: 420px; }

  /* Horizontal lines */
  .line-left { height: 2px; width: 300px; left: 20%; top: 300px; }
  .line-right { height: 2px; width: 300px; right: 20%; top: 300px; }

  /* Diagonal lines */
  .line-top-left { width: 2px; height: 240px; left: 28%; top: 120px; transform: rotate(-35deg); }
  .line-top-right { width: 2px; height: 240px; right: 28%; top: 120px; transform: rotate(35deg); }
  .line-bottom-left { width: 2px; height: 240px; left: 28%; top: 420px; transform: rotate(35deg); }
  .line-bottom-right { width: 2px; height: 240px; right: 28%; top: 420px; transform: rotate(-35deg); }

</style>
</head>

<body>

<h1>Personal Cloud Feudal Map</h1>

<div class="map">

  <!-- TOP LORDS -->
  <div class="lord"><h2>Alphabet</h2></div>
  <div class="lord"><h2>Apple</h2></div>
  <div class="lord"><h2>Amazon</h2></div>
  <div class="lord"><h2>Meta</h2></div>

  <!-- CONSUMER -->
  <div class="consumer" onclick="toggleWeb()">
    <span>THE CONSUMER</span>
    <small>(click to reveal web)</small>
  </div>

  <!-- BOTTOM LORDS -->
  <div class="lord"><h2>TikTok</h2></div>
  <div class="lord"><h2>Spotify</h2></div>
  <div class="lord"><h2>Discord</h2></div>
  <div class="lord"><h2>Netflix</h2></div>

  <!-- EXTRA LORD -->
  <div class="lord"><h2>Canvas</h2></div>

  <!-- SPIDER WEB LINES -->
  <div class="line line-top"></div>
  <div class="line line-bottom"></div>
  <div class="line line-left"></div>
  <div class="line line-right"></div>
  <div class="line line-top-left"></div>
  <div class="line line-top-right"></div>
  <div class="line line-bottom-left"></div>
  <div class="line line-bottom-right"></div>

</div>

<script>
  function toggleWeb() {
    document.querySelectorAll('.line').forEach(line => {
      line.classList.toggle('show');
    });
  }
</script>

</body>
</html>
