<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Cloud Feudal Map</title>

<style>
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 50px;
    color: #333;
  }

  h1 {
    text-align: center;
    font-size: 34px;
    margin-bottom: 40px;
    font-weight: 600;
  }

  .map-container {
    position: relative;
    width: 900px;
    height: 900px;
    margin: 0 auto;
  }

  /* Consumer in center */
  .consumer {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 180px;
    height: 180px;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, #222, #444);
    border-radius: 50%;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
    z-index: 10;
  }

  .consumer:hover {
    transform: translate(-50%, -50%) scale(1.05);
  }

  /* Lords arranged in a perfect circle */
  .lord {
    position: absolute;
    width: 160px;
    height: 160px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .lord:hover {
    transform: scale(1.05);
  }

  .more-info {
    display: none;
    margin-top: 10px;
    background: #f9f9f9;
    padding: 10px;
    border-radius: 10px;
  }

  /* Curved glowing spider silk lines */
  svg path {
    stroke: #bbb;
    stroke-width: 3;
    fill: none;
    opacity: 0;
    transition: opacity 1s ease, stroke 0.5s ease;
  }

  svg path.show {
    opacity: 1;
    stroke: #7fc8ff;
    filter: drop-shadow(0 0 6px #7fc8ff);
  }
</style>
</head>

<body>

<h1>Personal Cloud Feudal Map</h1>

<div class="map-container">

  <!-- SVG curved lines -->
  <svg width="900" height="900" style="position:absolute; top:0; left:0;">
    <!-- 9 curved connections -->
    <path id="line1" d="M450 450 Q450 150 650 200" />
    <path id="line2" d="M450 450 Q600 200 750 350" />
    <path id="line3" d="M450 450 Q700 450 750 550" />
    <path id="line4" d="M450 450 Q600 700 650 750" />
    <path id="line5" d="M450 450 Q450 750 450 800" />
    <path id="line6" d="M450 450 Q300 700 250 750" />
    <path id="line7" d="M450 450 Q200 450 150 550" />
    <path id="line8" d="M450 450 Q300 200 250 150" />
    <path id="line9" d="M450 450 Q450 150 450 100" />
  </svg>

  <!-- Consumer -->
  <div class="consumer" onclick="toggleWeb()">
    <strong>THE CONSUMER</strong>
    <small>(click to reveal web)</small>
  </div>

  <!-- Lords in perfect circle -->
  <script>
    const lords = [
      "Alphabet", "Apple", "Amazon", "Meta",
      "TikTok", "Spotify", "Discord", "Netflix", "Canvas"
    ];
  </script>

  <!-- Generate lord positions -->
  <script>
    const radius = 330;
    const centerX = 450;
    const centerY = 450;

    lords.forEach((name, i) => {
      const angle = (i / 9) * (2 * Math.PI);
      const x = centerX + radius * Math.cos(angle) - 80;
      const y = centerY + radius * Math.sin(angle) - 80;

      document.write(`
        <div class="lord" style="left:${x}px; top:${y}px;" onclick="toggleInfo('${name}')">
          <h3>${name}</h3>
          <div id="${name}" class="more-info">
            Rent: (your description here)
          </div>
        </div>
      `);
    });
  </script>

</div>

<script>
  function toggleWeb() {
    document.querySelectorAll("svg path").forEach(p => {
      p.classList.toggle("show");
    });
  }

  function toggleInfo(id) {
    const box = document.getElementById(id);
    box.style.display = box.style.display === "block" ? "none" : "block";
  }
</script>

</body>
</html>
